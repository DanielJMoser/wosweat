[build]
  command = "npm run build"
  functions = "backend/functions"
  publish = "frontend/dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium"]

[dev]
  functions = "backend/functions"
  command = "npm run dev --workspace=@wosweat/frontend"
  targetPort = 5173
  framework = "#custom"
  port = 8888
  autoLaunch = true
  # Used only when running `netlify dev` without --filter; root `npm run dev` filters to @wosweat/backend